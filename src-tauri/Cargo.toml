[package]
name = "local-llm-app"
version = "0.1.1"
description = "Froglips — local LLM chat, MLX backend"
authors = ["joseph"]
edition = "2021"

[lib]
name = "local_llm_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
tokio = { version = "1", features = ["process", "io-util", "sync", "rt-multi-thread", "macros", "time", "net"] }
anyhow = "1"
dirs = "5"
rusqlite = { version = "0.32", features = ["bundled"] }
r2d2 = "0.8"
once_cell = "1"
parking_lot = "0.12"
url = "2"
regex = "1"
