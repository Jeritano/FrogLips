[package]
name = "local-llm-app"
version = "0.9.14"
description = "Froglips — local LLM chat, MLX backend"
authors = ["joseph"]
edition = "2021"

[lib]
name = "local_llm_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-opener = "2"
tauri-plugin-updater = "2"
tauri-plugin-process = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["process", "io-util", "sync", "rt-multi-thread", "macros", "time", "net"] }
anyhow = "1"
dirs = "5"
rusqlite = { version = "0.32", features = ["bundled"] }
r2d2 = "0.8"
once_cell = "1"
parking_lot = "0.12"
url = "2"
regex = "1"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "gzip", "brotli", "deflate", "stream"] }
futures = "0.3"
base64 = "0.22"
pdf-extract = "0.7"
html2text = "0.13"
sha2 = "0.10"
notify = "8"
globset = "0.4"

# Native inference (alpha) — fast in-process LLM. Two backends:
#   * mistralrs + candle + Metal — macOS aarch64 only (`native-mistralrs`).
#   * llama.cpp via llama-cpp-2 — cross-platform GGUF (`native-llamacpp`).
# Mutually exclusive — `native_inference/mod.rs` has a compile_error! guard.
# Build with --features native-mistralrs (or native-llamacpp).
mistralrs-core = { version = "0.8.1", default-features = false, features = ["metal", "accelerate"], optional = true }
candle-core = { version = "0.10", default-features = false, features = ["metal", "accelerate"], optional = true }
indexmap = { version = "2", optional = true }
either = { version = "1", optional = true }
serde_yaml = { version = "0.9", optional = true }
# llama-cpp-2: bundles llama.cpp via cmake. `metal` feature flag enables
# Apple GPU offload on macOS. Pin minor; upstream API churns.
llama-cpp-2 = { version = "0.1", default-features = false, features = ["metal"], optional = true }

# Browser automation (alpha) — agent-controlled headless Chrome via CDP.
# Enabled via the "browser-automation" feature; requires a Chrome/Chromium
# binary on the user's machine (chromiumoxide does NOT bundle one).
chromiumoxide = { version = "0.7", default-features = false, features = ["tokio-runtime"], optional = true }
futures-util = { version = "0.3", optional = true }

[features]
default = []
# Umbrella flag — no-op base. Real backends opt in below.
native-inference = []
native-mistralrs = ["native-inference", "dep:mistralrs-core", "dep:candle-core", "dep:indexmap", "dep:either", "dep:serde_yaml"]
native-llamacpp  = ["native-inference", "dep:llama-cpp-2"]
browser-automation = ["dep:chromiumoxide", "dep:futures-util"]
