name: Release builds

# Builds + publishes the macOS (Apple Silicon) binary on tag push.
# Froglips is a native macOS app — `native-mistralrs` (mistralrs + candle +
# Metal) is the only backend, so there is a single build target.
#
# The build job signs the bundle (via TAURI_SIGNING_PRIVATE_KEY), uploads the
# artifacts, then `publish` assembles the updater `latest.json` manifest and
# attaches everything to the GitHub release.
#
# The local dev path (`scripts/release.sh`) produces the same artifact shape
# (DMG + .app.tar.gz + .sig), so either path can ship a release.

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: aarch64-apple-darwin-native-mistralrs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: npm ci
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npm run tauri build -- --features native-mistralrs --target aarch64-apple-darwin

      - name: Collect bundle artifacts
        shell: bash
        run: |
          set -e
          DEST="dist-artifacts"
          mkdir -p "$DEST"
          BASE="src-tauri/target/aarch64-apple-darwin/release/bundle"
          [ -d "$BASE" ] || BASE="src-tauri/target/release/bundle"
          echo "Scanning $BASE"
          find "$BASE" -maxdepth 4 -type f \( \
            -name '*.dmg' -o \
            -name '*.app.tar.gz' -o \
            -name '*.app.tar.gz.sig' \
          \) -print -exec cp {} "$DEST/" \;
          ls -la "$DEST"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: froglips-aarch64-apple-darwin
          path: dist-artifacts/
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          find all-artifacts -type f -exec cp {} release-assets/ \;
          ls -la release-assets

      # Updater manifest — macOS Apple Silicon only (darwin-aarch64).
      - name: Build latest.json
        shell: bash
        run: |
          set -e
          VERSION="${GITHUB_REF##*/v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/v${VERSION}"

          find_one() {
            find release-assets -maxdepth 1 -type f -name "$1" | head -n1
          }
          MAC_ARM=$(find_one '*aarch64*.app.tar.gz')
          MAC_ARM_SIG=$(find_one '*aarch64*.app.tar.gz.sig')

          # Fail loudly instead of publishing a manifest with an empty
          # `platforms` map. A missing signature here almost always means the
          # build job ran without TAURI_SIGNING_PRIVATE_KEY — shipping the
          # resulting latest.json would silently break the in-app updater for
          # everyone on the previous version.
          if [ -z "$MAC_ARM" ] || [ ! -s "$MAC_ARM" ] || [ -z "$MAC_ARM_SIG" ] || [ ! -s "$MAC_ARM_SIG" ]; then
            echo "::error::missing signed mac-arm64 artifact"
            exit 1
          fi

          export VERSION PUB_DATE BASE_URL MAC_ARM MAC_ARM_SIG

          python3 <<'PY' > release-assets/latest.json
          import json, os
          base = os.environ["BASE_URL"]
          p = os.environ.get("MAC_ARM", "")
          s = os.environ.get("MAC_ARM_SIG", "")
          plats = {}
          if p and s and os.path.isfile(s):
              plats["darwin-aarch64"] = {
                  "signature": open(s).read().strip(),
                  "url": f"{base}/{os.path.basename(p)}",
              }
          print(json.dumps({
              "version": os.environ["VERSION"],
              "notes": "See release notes on GitHub.",
              "pub_date": os.environ["PUB_DATE"],
              "platforms": plats,
          }, indent=2))
          PY
          echo "--- latest.json ---"
          cat release-assets/latest.json

      # Integrity manifest: a single SHA256SUMS covering every release asset
      # so a manual download can be verified with `sha256sum -c SHA256SUMS`.
      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -e
          cd release-assets
          : > SHA256SUMS
          for f in *; do
            [ "$f" = "SHA256SUMS" ] && continue
            [ "$f" = "latest.json" ] && continue
            [ -f "$f" ] || continue
            sha256sum "$f" >> SHA256SUMS
          done
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Attach artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF##*/}"
          gh release upload "$TAG" release-assets/* --clobber --repo "${{ github.repository }}"
