name: Release builds

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 builds are produced + signed locally by scripts/release.sh.
          # CI only covers Linux + Windows where the user can't easily build natively.
          - platform: ubuntu-22.04
            args: ''
            target: ''
          - platform: windows-latest
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: npm ci
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npx tauri build ${{ matrix.args }}

      - name: Collect bundle artifacts
        id: collect
        shell: bash
        run: |
          set -e
          DEST="dist-artifacts"
          mkdir -p "$DEST"
          for base in \
            "src-tauri/target/${{ matrix.target }}/release/bundle" \
            "src-tauri/target/release/bundle"; do
            [ -d "$base" ] || continue
            # macOS: .dmg, .app.tar.gz (+ .sig)
            find "$base" -maxdepth 3 -type f \( \
              -name '*.dmg' -o \
              -name 'Froglips.app.tar.gz' -o \
              -name 'Froglips.app.tar.gz.sig' -o \
              -name '*.deb' -o \
              -name '*.AppImage' -o \
              -name '*.rpm' -o \
              -name '*.msi' -o \
              -name '*.exe' \
            \) -print -exec cp {} "$DEST/" \;
          done
          ls -la "$DEST" || true

      - name: Upload build artifacts (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: froglips-${{ matrix.platform }}-${{ matrix.target }}
          path: dist-artifacts/
          if-no-files-found: warn
          retention-days: 14

      - name: Attach artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF##*/}"
          if [ -d dist-artifacts ] && [ -n "$(ls -A dist-artifacts 2>/dev/null)" ]; then
            # --clobber so re-runs overwrite without erroring
            gh release upload "$TAG" dist-artifacts/* --clobber --repo "${{ github.repository }}"
          else
            echo "No artifacts to attach for ${{ matrix.platform }} (${{ matrix.target }})"
          fi
