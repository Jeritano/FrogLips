name: Release builds

# Builds + publishes the macOS (Apple Silicon) binary on tag push.
# Froglips is a native macOS app — `native-mistralrs` (mistralrs + candle +
# Metal) is the only backend, so there is a single build target.
#
# The build job signs the bundle (via TAURI_SIGNING_PRIVATE_KEY), uploads the
# artifacts, then `publish` assembles the updater `latest.json` manifest and
# attaches everything to the GitHub release.
#
# The local dev path (`scripts/release.sh`) produces the same artifact shape
# (DMG + .app.tar.gz + .sig), so either path can ship a release.

on:
  # Releases are cut LOCALLY via `scripts/release.sh` (build + Developer-ID sign
  # + Apple notarize + `gh release` upload) — that is the supported path. This
  # CI workflow needs the Apple Developer ID cert + notary credentials as repo
  # secrets to produce a signed mac-arm64 artifact; those are NOT configured, so
  # a tag-triggered run always failed ("missing signed mac-arm64 artifact") and
  # emailed a red build on every release. It is therefore manual-only — run it
  # from the Actions tab IF/when those signing secrets are ever added.
  workflow_dispatch: {}

# Two simultaneous tag pushes (e.g. an accidental re-push, or a fast retag)
# would race on `gh release upload --clobber` and could leave the release with
# a half-updated asset set. Serialize per-ref. We do *not* cancel in-progress
# runs — finishing the active release safely is more important than the
# latency win from preemption.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-14
    # Build job only emits workflow artifacts via actions/upload-artifact,
    # which uses an internal API and does not need `contents: write`.
    # Maturity review C2: tightened from contents:write to read-only so a
    # compromised step in this job cannot push to the repo.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: aarch64-apple-darwin-native-mistralrs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: npm ci
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Developer ID signing + notarization. The Tauri bundler imports the
          # base64 .p12 into a temporary keychain itself when APPLE_CERTIFICATE
          # is set, signs with hardened runtime, submits to the notary service,
          # and staples — same env contract as scripts/release.sh.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npm run tauri build -- --features native-mistralrs --target aarch64-apple-darwin

      # The bundler has a deterministic defect (observed on every notarized
      # build so far, 2026-06-09/10): it notarizes + staples the .app, then a
      # later bundling step re-signs it AD-HOC — stripping Developer ID +
      # hardened runtime and unbinding the ticket. Detect, repair (re-sign →
      # re-notarize → re-staple → rebuild DMG + updater tarball), and hard-gate
      # on Gatekeeper acceptance. Mirrors the self-heal in scripts/release.sh.
      - name: Verify + self-heal notarization
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          BASE="src-tauri/target/aarch64-apple-darwin/release/bundle"
          [ -d "$BASE" ] || BASE="src-tauri/target/release/bundle"
          APP="$BASE/macos/Froglips.app"
          VERSION="${GITHUB_REF##*/v}"

          sig_ok=1
          codesign -dvv "$APP" 2>&1 | grep -q "Authority=Developer ID Application" || sig_ok=0
          xcrun stapler validate "$APP" >/dev/null 2>&1 || sig_ok=0
          if [ "$sig_ok" -ne 1 ]; then
            echo "Bundler clobbered the Developer ID signature — repairing"
            codesign --force --options runtime --timestamp \
              --entitlements src-tauri/Entitlements.plist \
              --sign "$APPLE_SIGNING_IDENTITY" "$APP"
            ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/notarize.zip"
            xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
              --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" --wait
            xcrun stapler staple "$APP"

            DMG="$BASE/dmg/Froglips_${VERSION}_aarch64.dmg"
            rm -f "$DMG"
            hdiutil create -volname "Froglips" -srcfolder "$APP" -ov -format UDZO "$DMG"
            codesign --force --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$DMG"
            xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" --wait
            xcrun stapler staple "$DMG"

            TARBALL="$BASE/macos/Froglips.app.tar.gz"
            rm -f "$TARBALL" "$TARBALL.sig"
            tar -czf "$TARBALL" -C "$BASE/macos" Froglips.app
            # Signer CLI: env var carries key CONTENT; do not mix with
            # --private-key-path (see scripts/release.sh).
            npx @tauri-apps/cli signer sign "$TARBALL"
          fi
          spctl -a -vv "$APP" 2>&1 | grep -q "Notarized Developer ID" || {
            echo "::error::Gatekeeper does not accept the build as Notarized Developer ID"
            exit 1
          }
          echo "Notarization verified"

      - name: Collect bundle artifacts
        shell: bash
        run: |
          set -e
          DEST="dist-artifacts"
          mkdir -p "$DEST"
          BASE="src-tauri/target/aarch64-apple-darwin/release/bundle"
          [ -d "$BASE" ] || BASE="src-tauri/target/release/bundle"
          echo "Scanning $BASE"
          find "$BASE" -maxdepth 4 -type f \( \
            -name '*.dmg' -o \
            -name '*.app.tar.gz' -o \
            -name '*.app.tar.gz.sig' \
          \) -print -exec cp {} "$DEST/" \;
          ls -la "$DEST"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: froglips-aarch64-apple-darwin
          path: dist-artifacts/
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          find all-artifacts -type f -exec cp {} release-assets/ \;
          ls -la release-assets

      # Extract this version's section from CHANGELOG.md for the GitHub release
      # body. The file uses Keep-a-Changelog headers: `## [0.14.4] — 2026-06-15`.
      # We slice from the matching `## [<version>]` header to the next `## [`
      # header (exclusive). If the version has no section (forgot to add one),
      # fall back to a stable placeholder rather than failing the release.
      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF##*/v}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          if [ -f CHANGELOG.md ]; then
            # awk: start printing at the `## [VERSION]` line, stop at the next
            # top-level `## [` section header. Anchored to the line start so a
            # `## [x]` inside body prose can't trip it.
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { grab=1; next }
              grab && /^## \[/        { exit }
              grab                     { print }
            ' CHANGELOG.md > "$NOTES_FILE"
          else
            : > "$NOTES_FILE"
          fi
          # Strip leading/trailing blank lines; if empty, use a placeholder.
          if ! grep -q '[^[:space:]]' "$NOTES_FILE"; then
            printf 'See CHANGELOG.md and the release assets below.\n' > "$NOTES_FILE"
            echo "No CHANGELOG section for v${VERSION} — using placeholder body."
          fi
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          echo "--- release notes (v${VERSION}) ---"
          cat "$NOTES_FILE"

      # Updater manifest — macOS Apple Silicon only (darwin-aarch64).
      - name: Build latest.json
        env:
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
        shell: bash
        run: |
          set -e
          VERSION="${GITHUB_REF##*/v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/v${VERSION}"

          find_one() {
            find release-assets -maxdepth 1 -type f -name "$1" | head -n1
          }
          MAC_ARM=$(find_one '*aarch64*.app.tar.gz')
          MAC_ARM_SIG=$(find_one '*aarch64*.app.tar.gz.sig')

          # Fail loudly instead of publishing a manifest with an empty
          # `platforms` map. A missing signature here almost always means the
          # build job ran without TAURI_SIGNING_PRIVATE_KEY — shipping the
          # resulting latest.json would silently break the in-app updater for
          # everyone on the previous version.
          if [ -z "$MAC_ARM" ] || [ ! -s "$MAC_ARM" ] || [ -z "$MAC_ARM_SIG" ] || [ ! -s "$MAC_ARM_SIG" ]; then
            echo "::error::missing signed mac-arm64 artifact"
            exit 1
          fi

          export VERSION PUB_DATE BASE_URL MAC_ARM MAC_ARM_SIG

          python3 <<'PY' > release-assets/latest.json
          import json, os
          base = os.environ["BASE_URL"]
          p = os.environ.get("MAC_ARM", "")
          s = os.environ.get("MAC_ARM_SIG", "")
          # Notes shown by the in-app "update available" affordance. Reuse the
          # CHANGELOG section extracted earlier; fall back to the prior
          # placeholder if the file is missing/empty.
          notes = "See release notes on GitHub."
          nf = os.environ.get("NOTES_FILE", "")
          if nf and os.path.isfile(nf):
              body = open(nf, encoding="utf-8").read().strip()
              if body:
                  notes = body
          plats = {}
          if p and s and os.path.isfile(s):
              plats["darwin-aarch64"] = {
                  "signature": open(s).read().strip(),
                  "url": f"{base}/{os.path.basename(p)}",
              }
          print(json.dumps({
              "version": os.environ["VERSION"],
              "notes": notes,
              "pub_date": os.environ["PUB_DATE"],
              "platforms": plats,
          }, indent=2))
          PY
          echo "--- latest.json ---"
          cat release-assets/latest.json

      # Integrity manifest: a single SHA256SUMS covering every release asset
      # so a manual download can be verified with `sha256sum -c SHA256SUMS`.
      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -e
          cd release-assets
          : > SHA256SUMS
          for f in *; do
            [ "$f" = "SHA256SUMS" ] && continue
            [ "$f" = "latest.json" ] && continue
            [ -f "$f" ] || continue
            sha256sum "$f" >> SHA256SUMS
          done
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      # Sign the integrity manifest with the same minisign key Tauri uses for
      # updater signatures. Without this, an attacker with repo-write access
      # could swap a DMG and rewrite SHA256SUMS undetected — the hash file is
      # only as trustworthy as its source. The .minisig file ships alongside
      # SHA256SUMS so downloaders can verify with the published pubkey.
      #
      # minisign reads the secret key from a file, not stdin, so we write it
      # to a tempfile under $RUNNER_TEMP, sign, then shred+delete. The key
      # never lands on disk in the workspace.
      - name: Sign SHA256SUMS
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY missing — cannot sign SHA256SUMS"
            exit 1
          fi
          # Install minisign (ubuntu-latest runner)
          sudo apt-get update -qq
          sudo apt-get install -y -qq minisign

          KEYFILE="$(mktemp "${RUNNER_TEMP:-/tmp}/froglips-signing-key.XXXXXX")"
          # The Tauri secret is the raw minisign secret-key file contents.
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > "$KEYFILE"
          chmod 600 "$KEYFILE"

          cleanup() {
            if [ -f "$KEYFILE" ]; then
              shred -u "$KEYFILE" 2>/dev/null || rm -f "$KEYFILE"
            fi
          }
          trap cleanup EXIT

          cd release-assets
          # -W disables password prompt; the key uses a password supplied via
          # MINISIGN_PASSWORD env if set, else assumes empty password.
          export MINISIGN_PASSWORD="${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}"
          # Use printf to feed the password (minisign reads from /dev/tty by
          # default; piping stdin works for non-interactive runs).
          printf '%s\n' "$MINISIGN_PASSWORD" | minisign -S -s "$KEYFILE" -m SHA256SUMS
          ls -la SHA256SUMS SHA256SUMS.minisig
          echo "--- SHA256SUMS.minisig ---"
          cat SHA256SUMS.minisig

      - name: Attach artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF##*/}"
          REPO="${{ github.repository }}"
          # The release may or may not already exist (a tag push doesn't create
          # one on its own). Create it with the CHANGELOG-derived body if absent,
          # otherwise refresh the body so a re-run keeps notes in sync. We only
          # set --notes on edit (not --title) so a maintainer-set title isn't
          # clobbered back to the bare tag; on create we seed the title from the
          # tag. Either way the artifacts are uploaded with --clobber.
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$REPO" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" --repo "$REPO" \
              --title "$TAG" --notes-file "$NOTES_FILE"
          fi
          gh release upload "$TAG" release-assets/* --clobber --repo "$REPO"
