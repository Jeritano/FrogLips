name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --no-default-features -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --no-default-features

  # Production backend lint/test. `native-mistralrs` is the only backend
  # actually shipped to users; the lean `--no-default-features` job above
  # only protects the dev-iteration build. This job is what guards the
  # release path.
  rust-native:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: native-mistralrs

      - name: cargo check (native-mistralrs)
        working-directory: src-tauri
        run: cargo check --features native-mistralrs

      - name: cargo clippy (native-mistralrs)
        working-directory: src-tauri
        run: cargo clippy --features native-mistralrs -- -D warnings

      - name: cargo test (native-mistralrs)
        working-directory: src-tauri
        run: cargo test --features native-mistralrs --lib

      # Smoke-check the browser-automation feature so chromiumoxide /
      # related transitives stay buildable. `check` (not full clippy/test)
      # because the dep graph is heavy and we don't want to double the
      # job's compile budget — we just need to catch breakage early.
      - name: cargo check (browser-automation)
        working-directory: src-tauri
        run: cargo check --features browser-automation

      # cargo-audit reads Cargo.lock; it doesn't compile anything, so
      # running it on the *shipped* feature set (native-mistralrs pulls in
      # mistralrs-core / candle-core / indexmap / either / serde_yaml, none
      # of which the lean no-default-features build sees) is what actually
      # protects releases.
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        working-directory: src-tauri
        run: cargo audit

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: npm ci
        run: npm ci

      # Non-blocking dependency advisory check. Findings get triaged into
      # follow-up issues; we don't want a transitive CVE to redline CI before
      # it can be evaluated. Promote to blocking once the baseline is clean.
      - name: npm audit (advisory only)
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vitest
        if: hashFiles('vitest.config.ts') != ''
        run: npm test

      - name: Build
        run: npm run build
