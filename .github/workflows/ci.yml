name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default: required jobs only need to read the repo.
# Any job that needs more (e.g. upload-artifact already grants its own)
# must override locally. Removes ambient write capability that a
# compromised action could otherwise use to push commits.
permissions:
  contents: read

jobs:
  # Maturity review P2 #48: version must stay in lockstep across three
  # files. A drifted release lands the user a binary whose Info plist,
  # bundle, and crate version disagree — auto-updater handshake fails
  # and the "About" dialog lies. Cheap pre-build gate.
  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify package.json / tauri.conf.json / Cargo.toml versions agree
        run: |
          set -euo pipefail
          PKG=$(jq -r .version package.json)
          TAURI=$(jq -r .version src-tauri/tauri.conf.json)
          CARGO=$(grep -m1 '^version' src-tauri/Cargo.toml | sed -E 's/version *= *"(.*)"/\1/')
          echo "package.json     : $PKG"
          echo "tauri.conf.json  : $TAURI"
          echo "Cargo.toml       : $CARGO"
          if [ "$PKG" != "$TAURI" ] || [ "$PKG" != "$CARGO" ]; then
            echo "::error::Version drift detected — all three must match before release."
            exit 1
          fi

  rust:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --no-default-features -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --no-default-features

  # Production backend lint/test. `native-mistralrs` is the only backend
  # actually shipped to users; the lean `--no-default-features` job above
  # only protects the dev-iteration build. This job is what guards the
  # release path.
  rust-native:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: native-mistralrs

      - name: cargo check (native-mistralrs)
        working-directory: src-tauri
        run: cargo check --features native-mistralrs

      - name: cargo clippy (native-mistralrs)
        working-directory: src-tauri
        run: cargo clippy --features native-mistralrs -- -D warnings

      - name: cargo test (native-mistralrs)
        working-directory: src-tauri
        run: cargo test --features native-mistralrs --lib

      # Smoke-check the browser-automation feature so chromiumoxide /
      # related transitives stay buildable. `check` (not full clippy/test)
      # because the dep graph is heavy and we don't want to double the
      # job's compile budget — we just need to catch breakage early.
      - name: cargo check (browser-automation)
        working-directory: src-tauri
        run: cargo check --features browser-automation

      # Maturity review M15: locked to aarch64-apple-darwin in production,
      # but if a contributor on an Intel Mac (or future CI matrix) lands
      # code that breaks x86_64 builds, nothing catches it. Compile-only
      # check is cheap; full clippy/test cost is not justified yet.
      - name: Add x86_64-apple-darwin target
        run: rustup target add x86_64-apple-darwin
      - name: cargo check (x86_64-apple-darwin, native-mistralrs)
        working-directory: src-tauri
        run: cargo check --target x86_64-apple-darwin --features native-mistralrs

  # Supply-chain advisories — split out of the required jobs so:
  # (a) the truth surfaces. Maturity review C4: previously `cargo deny`
  #     and `npm audit` lived under required jobs with `continue-on-error`,
  #     which made the "4 of 4 required status checks" gate a paper tiger
  #     — supply-chain findings shipped green.
  # (b) findings still run on every PR and publish to the run summary,
  #     so reviewers see them even though the job is not branch-protected.
  # Promote any of these to required by removing from this job and putting
  # back under `rust-native` / `frontend` without `continue-on-error`.
  supply-chain-advisory:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: supply-chain

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: npm ci
        run: npm ci

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      # cargo-audit reads Cargo.lock; it doesn't compile anything, so
      # running it on the *shipped* feature set (native-mistralrs pulls in
      # mistralrs-core / candle-core / indexmap / either / serde_yaml, none
      # of which the lean no-default-features build sees) is what actually
      # protects releases.
      # Audit A16: BLOCKING (was continue-on-error). A production-dependency
      # advisory must FAIL this job — the reqwest "blocking"-feature drift +
      # esbuild advisories shipped green while these were non-blocking. Mark
      # `supply-chain-advisory` as a REQUIRED status check in branch protection
      # so a prod-dep finding actually blocks merge.
      - name: cargo audit (production)
        working-directory: src-tauri
        run: cargo audit

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: cargo deny check (bans + licenses + sources)
        working-directory: src-tauri
        continue-on-error: true
        run: cargo deny check

      # Production deps only — bare `--omit=dev` masks devtime supply chain
      # risk (vite plugins, vitest). This step covers prod; the next covers
      # the full tree.
      # A16: BLOCKING for PRODUCTION deps (--omit=dev excludes the vite/esbuild
      # dev-only advisories, so those don't block here).
      - name: npm audit (production, high+)
        run: npm audit --omit=dev --audit-level=high

      # Devtime advisories (esbuild via vite, vitest) stay ADVISORY — dev-only,
      # not shipped to users; surfaced in the run summary but not blocking.
      - name: npm audit (devtime, high+)
        continue-on-error: true
        run: npm audit --audit-level=high

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: npm ci
        run: npm ci

      # npm audit moved to the supply-chain-advisory job — it lived here
      # under continue-on-error, which made the required-frontend gate
      # silently green on supply-chain findings (audit C4, 2026-05-27).

      - name: TypeScript check
        run: npx tsc --noEmit

      # CSS hygiene gates (2026-06-11). Stylelint catches structural errors
      # (bad selectors, unknown properties, custom property used without
      # var()); config lives in .stylelintrc.json. Invoked via npx — no
      # package.json script on purpose, the gate is CI-owned.
      - name: Stylelint
        run: npx stylelint "src/styles/*.css"

      # Stylelint cannot verify that a var(--x) reference points at a token
      # that actually exists — an undeclared token resolves to the fallback
      # or to `unset` at runtime and the style silently drops (this shipped
      # real bugs: --fg-dim, --surface-1, --border-hairline-as-color).
      # Declared set = custom properties declared in src/styles/*.css plus
      # tokens set at runtime from TS/TSX (style.setProperty / inline style
      # objects, e.g. --seat, --ui-font, --user-bubble, --wf-fly-*).
      - name: CSS token integrity
        run: |
          set -euo pipefail
          declared=$(mktemp)
          used=$(mktemp)
          grep -hoE -- '--[A-Za-z0-9_-]+[[:space:]]*:' src/styles/*.css \
            | sed -E 's/[[:space:]]*:$//' | sort -u > "$declared"
          { grep -rhoE "[\"']--[A-Za-z0-9_-]+[\"']" src --include='*.ts' --include='*.tsx' || true; } \
            | tr -d "\"'" >> "$declared"
          sort -u -o "$declared" "$declared"
          grep -hoE 'var\([[:space:]]*--[A-Za-z0-9_-]+' src/styles/*.css \
            | sed -E 's/var\([[:space:]]*//' | sort -u > "$used"
          missing=$(comm -13 "$declared" "$used")
          if [ -n "$missing" ]; then
            echo "::error::var() references to undeclared CSS custom properties:"
            echo "$missing"
            exit 1
          fi
          echo "CSS token integrity OK: $(wc -l < "$used") referenced tokens, all declared."

      - name: Vitest
        if: hashFiles('vitest.config.ts') != ''
        run: npm test

      - name: Build
        run: npm run build

      # Playwright e2e — previously not run in CI despite 12 specs sitting
      # in e2e/. Now invoked here so regressions in the agent-confirm,
      # send-message, export-conversation, etc. flows surface on every PR
      # instead of only when someone runs `npm run e2e` locally.
      # Browser install is cached via setup-node, and we cap retries to 2
      # so a flaky test doesn't redline the whole run.
      - name: Install Playwright browsers
        if: hashFiles('playwright.config.ts') != ''
        run: npx playwright install --with-deps chromium

      # Drop --retries to surface flakes instead of silently re-running.
      # Maturity review M14: --retries=2 masked real intermittent test
      # bugs by hiding them under a successful second/third run. With 0
      # retries flaky tests fail loudly and get triaged.
      #
      # BLOCKING again (2026-06-18): the suite is green. The earlier red was
      # (a) the first-run-tour overlay intercepting clicks — fixed in the shared
      # fixture (tauri-mock seeds froglips.tourSeen), and (b) the plain-chat
      # specs mocking /v1/chat/completions while backend=ollama actually streams
      # the native /api/chat NDJSON path — the mocks now match the real endpoint.
      - name: Playwright e2e
        if: hashFiles('playwright.config.ts') != ''
        run: npx playwright test --reporter=line --retries=0

      - name: Upload Playwright artifacts on failure
        if: failure() && hashFiles('playwright.config.ts') != ''
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failures
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
