name: release-please

# Maintains a long-lived PR that drafts the next release. When merged,
# it tags `v<next>` and bumps the version files in lockstep. The
# release.yml workflow then takes over on tag-push.
#
# Activates only on commits using Conventional Commits (`feat:`, `fix:`,
# `chore:`, etc.). Pre-existing commits without the convention are
# ignored — the bump scope starts fresh from the day this lands.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Reads .release-please-manifest.json + release-please-config.json
          # to know which packages to track. Single-package config here.
          token: ${{ secrets.GITHUB_TOKEN }}
