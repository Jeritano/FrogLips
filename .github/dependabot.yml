version: 2

# Dependabot tracks three package ecosystems for Froglips:
#   - cargo  (src-tauri/)
#   - npm    (root)
#   - github-actions (.github/workflows/)
#
# Cadence: weekly for all three so PR review stays scoped. Security
# advisories trigger their own immediate PRs regardless of cadence
# (controlled by the repo-level `dependabot_security_updates` setting).
#
# Grouping: minor + patch are grouped so one weekly PR carries the
# whole batch; majors get their own PRs because they tend to need
# manual code changes.

updates:
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["deps", "rust"]
    groups:
      cargo-minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Tauri is updated in lockstep with the release line. Pin to the
      # 2.x track and review majors manually.
      - dependency-name: "tauri"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tauri-build"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["deps", "node"]
    groups:
      npm-minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # React majors need manual migration + every component review.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels: ["deps", "ci"]
